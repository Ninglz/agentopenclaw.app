name: Distribute Credits
on:
  workflow_dispatch:
    inputs:
      userId:
        description: 'User ID to distribute credits to'
        required: true
      amount:
        description: 'Amount of credits to distribute'
        required: true

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run distribute-credits
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          USER_ID: ${{ github.event.inputs.userId }}
          AMOUNT: ${{ github.event.inputs.amount }}
